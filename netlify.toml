[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Service worker must not be redirected
[[redirects]]
  from = "/sw.js"
  to = "/sw.js"
  status = 200

[[redirects]]
  from = "/workbox-*.js"
  to = "/workbox-:splat.js"
  status = 200

# SPA fallback (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled function: poll stats every minute (lock prevents overlap)
[functions."poll-stats"]
  schedule = "* * * * *"

# Scheduled function: room cleanup heartbeat — purges 30min after all games finish
[functions."room-cleanup"]
  schedule = "*/30 * * * *"

# Scheduled function: create public rooms for today's NBA games (every 5 min)
[functions."sync-games"]
  schedule = "*/5 * * * *"

# Scheduled function: pre-fetch and refresh player prop odds onto lobby rooms (every 5 min)
[functions."refresh-odds"]
  schedule = "*/5 * * * *"
